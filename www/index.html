<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Slip Gaji</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
    button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #45a049; }
    .result { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h2>💰 Aplikasi Slip Gaji</h2>
    <input type="text" id="nama" placeholder="Nama Karyawan">
    <input type="number" id="gaji" placeholder="Gaji Pokok">
    <input type="number" id="lembur" placeholder="Uang Lembur">
    <button onclick="hitung()">Hitung Gaji</button>
    
    <div id="hasil" class="result">
      <h3>Hasil Perhitungan:</h3>
      <p id="output"></p>
    </div>
  </div>

  <script>
    function hitung() {
      const nama = document.getElementById('nama').value;
      const gaji = parseFloat(document.getElementById('gaji').value) || 0;
      const lembur = parseFloat(document.getElementById('lembur').value) || 0;
      const total = gaji + lembur;
      
      document.getElementById('output').innerHTML = `
        <strong>Nama:</strong> ${nama}<br>
        <strong>Gaji Pokok:</strong> Rp ${gaji.toLocaleString()}<br>
        <strong>Lembur:</strong> Rp ${lembur.toLocaleString()}<br>
        <hr>
        <strong>Total Gaji: Rp ${total.toLocaleString()}</strong>
      `;
      document.getElementById('hasil').style.display = 'block';
    }
  </script>
</body>
</html>
